<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - SusConecta</title>
<link rel="stylesheet" href="../css/cadastro.css">
<style>
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.register-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:350px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.register-box h2{
  margin-bottom:10px;
}

.register-box p{
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

.form-group{
  margin-bottom:15px;
}

.form-group label{
  display:block;
  font-size:14px;
  margin-bottom:5px;
}

.form-group input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.register-btn{
  width:100%;
  padding:12px;
  background:#1e4a75;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.register-btn:hover{
  background:#163a5f;
}

.login-link{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">SusConecta</div>
</div>

<div class="container">
  <div class="register-box">
    <h2>Criar conta</h2>
    <p>Cadastre-se para acessar sua saúde</p>

    <form>
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" placeholder="Digite seu nome">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
      </div>

      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" placeholder="Confirme sua senha">
      </div>

      <button class="register-btn">Cadastrar</button>
    </form>

    <div class="login-link">
      Já tem conta? <a href="#">Entrar</a>
    </div>
  </div>
</div>

</body>
</html>
