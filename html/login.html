<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - SusConecta</title>
<link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="sidebar">
  <div class="logo">SusConecta</div>
</div>

<div class="container">
  <div class="box">
    <h2>Entrar</h2>
    <p>Acesse sua conta</p>

    <form>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
      </div>

      <button class="btn">Entrar</button>
    </form>

    <div class="link">
      Não tem conta? <a href="#">Cadastrar</a>
    </div>
  </div>
</div>

</body>
</html>
