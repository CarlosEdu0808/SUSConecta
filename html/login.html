<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - SusConecta</title>
<link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="sidebar">
  <div class="logo">SusConecta</div>
</div>

<div class="container">
  <div class="box">
    <h2>Entrar</h2>
    <p>Acesse sua conta</p>

    <form action="dashboard.html">
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input 
            type="email" 
            id="email" 
            placeholder="exemplo@email.com" 
            required
          >
        </div>
        
        <div class="form-group">
          <label for="senha">Senha:</label>
          <input 
            type="password" 
            id="senha" 
            placeholder="No mínimo 8 caracteres" 
            minlength="8" 
            required
          >
        </div>
        <button type="submit" a href="./dashboard.html" class="btn">Entrar</button>
    </form>
    <div class="link">
      Não tem conta? <a href="./cadastro.html">Cadastrar</a>
    </div>
  </div>
</div>

</body>
</html>
